<section class="hero">

    <h2>User Login</h2>

    <form class="form-box" id="loginForm">

        <input 
            type="email" 
            id="loginEmail"
            placeholder="Enter Email" 
            required
        >

        <input 
            type="password" 
            id="loginPassword"
            placeholder="Enter Password" 
            required
        >

        <button type="submit" class="sos-btn">

            Login

        </button>

    </form>

</section>
